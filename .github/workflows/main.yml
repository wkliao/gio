name: Main CI

permissions:
  contents: read

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '**/*.1'
      - '**/*.jpg'
      - '**/*.png'
      - 'docs/*'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '**/*.1'
      - '**/*.jpg'
      - '**/*.png'
      - 'docs/*'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Enable manual run'
        required: false
        default: 'Manual trigger'

env:
   LIBTOOL_VERSION: 2.5.4
   MPICH_VERSION: 5.0.1
   OPENMPI_VERSION: 5.0.9

jobs:
    build:
      strategy:
        fail-fast: false # This disables the default cancel-on-failure behavior
        matrix:
          os: [ubuntu-latest]               # [ubuntu-latest, macos-latest]
          mpi_vendor: [ MPICH, OpenMPI ]
          fstype: [ ufs, mimic_lustre ]
          debug_mode: [ nodebug ]           # [ debug, nodebug ]

      runs-on: ${{ matrix.os }}
      timeout-minutes: 120

      steps:
        - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

        - name: Install autotools
          run: |
            set -x
            if test ${{ matrix.os }} == ubuntu-latest ; then
                sudo apt-get update
                sudo apt-get install autoconf
                sudo apt-get install automake
                sudo apt-get install m4

                # sudo apt-get install libtool libtool-bin
                wget -q https://ftp.gnu.org/gnu/libtool/libtool-${LIBTOOL_VERSION}.tar.gz
                gzip -dc libtool-${LIBTOOL_VERSION}.tar.gz | tar -xf -
                cd libtool-${LIBTOOL_VERSION}
                ./configure --prefix=/usr --silent
                sudo make -s LIBTOOLFLAGS=--silent V=1 -j 8 install > qout 2>&1
                sudo make -s LIBTOOLFLAGS=--silent V=1 -j 8 distclean >> qout 2>&1
            else
                brew update
                brew install coreutils
                brew install autoconf
                brew install automake
                brew install libtool
                export PATH="/opt/homebrew/opt/libtool/libexec/gnubin:${PATH}"
                brew list m4 || brew install m4
            fi
            which autoconf
            autoconf --version
            which automake
            automake --version
            which libtool
            libtool --version
            which m4
            m4 --version

        - name: Install MPI compiler vendor - ${{ matrix.mpi_vendor }}
          run: |
            set -x
            if test "${{ matrix.mpi_vendor }}" = "MPICH" ; then
                # MPICH versions older than 4.2.2 do not support the MPI large
                # count feature.
                # On Github CI, MPICH seems to run slower than OpenMPI. Tried
                # the following configurations:
                #   --with-device=ch3:sock is slow
                #   --with-device=ch3:nemesis is slower
                #   --with-device=ch4 is also slower
                #   --with-device=ch4:sock is not available yet for 5.0.1
                echo "Install MPICH ${MPICH_VERSION} in ${GITHUB_WORKSPACE}/MPI"
                wget -q https://www.mpich.org/static/downloads/${MPICH_VERSION}/mpich-${MPICH_VERSION}.tar.gz
                gzip -dc mpich-${MPICH_VERSION}.tar.gz | tar -xf -
                cd mpich-${MPICH_VERSION}
                ./configure --prefix=${GITHUB_WORKSPACE}/MPI \
                            --silent \
                            --enable-romio \
                            --with-file-system=ufs \
                            --with-device=ch3:sock \
                            --disable-fortran \
                            --disable-cxx \
                            CC=gcc
                make -s LIBTOOLFLAGS=--silent V=1 -j 8 install > qout 2>&1
                make -s LIBTOOLFLAGS=--silent V=1 -j 8 distclean >> qout 2>&1
            else # OpenMPI
                echo "Install OPENMPI ${OPENMPI_VERSION} in ${GITHUB_WORKSPACE}/MPI"
                VER_MAJOR=${OPENMPI_VERSION%.*}
                wget -q https://download.open-mpi.org/release/open-mpi/v${VER_MAJOR}/openmpi-${OPENMPI_VERSION}.tar.gz
                gzip -dc openmpi-${OPENMPI_VERSION}.tar.gz | tar -xf -
                cd openmpi-${OPENMPI_VERSION}
                if test "${{ matrix.os }}" = "macos-latest" ; then
                   # When built on MacOS, additional configure options are required.
                   EXTRA_OPTS="--with-hwloc=internal --with-pmix=internal --with-libevent=internal"
                fi
                ./configure --prefix=${GITHUB_WORKSPACE}/MPI \
                            --silent \
                            --with-io-romio-flags="--with-file-system=ufs" \
                            ${EXTRA_OPTS} \
                            --disable-mpi-fortran --disable-oshmem-fortran \
                            CC=gcc
                make -s LIBTOOLFLAGS=--silent V=1 -j 8 install > qout 2>&1
                make -s LIBTOOLFLAGS=--silent V=1 -j 8 distclean >> qout 2>&1
            fi

        - name: Configure and make
          run: |
            set -x
            cd ${GITHUB_WORKSPACE}
            if test ${{ matrix.os }} == macos-latest ; then
                export PATH="/opt/homebrew/opt/libtool/libexec/gnubin:${PATH}"
            fi
            if test ${{ matrix.fstype }} == mimic_lustre ; then
                export MIMIC_LUSTRE=yes
            fi
            if test ${{ matrix.debug_mode }} == debug ; then
                CONFIG_OPTS="--enable-debug"
            else
                CONFIG_OPTS="--disable-debug"
            fi
            MPI_RUN="${GITHUB_WORKSPACE}/MPI/bin/mpiexec -host localhost:10 -n NP"
            if test "${{ matrix.mpi_vendor }}" = "OpenMPI" ; then
               MPI_RUN="${GITHUB_WORKSPACE}/MPI/bin/mpirun --host localhost --oversubscribe -np NP"
            fi
            autoreconf -i
            mkdir -p ${GITHUB_WORKSPACE}/gio_output
            rm -rf build ; mkdir build ; cd build
            ${GITHUB_WORKSPACE}/configure \
                        --prefix=${GITHUB_WORKSPACE}/install \
                        gio_ac_debug=yes \
                        --enable-thread-safe \
                        --with-pthread \
                        ${CONFIG_OPTS} \
                        --with-mpi=${GITHUB_WORKSPACE}/MPI \
                        TESTOUTDIR=${GITHUB_WORKSPACE}/gio_output \
                        TESTMPIRUN="${MPI_RUN}"
            make -s LIBTOOLFLAGS=--silent V=1 -j 8 tests

        - name: Print config.log
          if: ${{ always() }}
          run: |
            cat ${GITHUB_WORKSPACE}/build/config.log

        - name: Check file system type - ${{ matrix.fstype }}
          if: ${{ always() }}
          run: |
            set -x
            cd ${GITHUB_WORKSPACE}
            if test ${{ matrix.os }} == macos-latest ; then
                export PATH="/opt/homebrew/opt/libtool/libexec/gnubin:${PATH}"
            fi
            gcc -Ibuild/src test/check_fstype.c -o check_fstype
            touch ./dummy
            ./check_fstype ./dummy

        - name: make check
          run: |
            cd ${GITHUB_WORKSPACE}/build
            make -s LIBTOOLFLAGS=--silent V=1 check

        - name: Print test log files
          if: ${{ always() }}
          run: |
            cd ${GITHUB_WORKSPACE}/build
            fname=`find src test examples -type f -name "*.log"`
            for f in $fname ; do \
               bname=`basename $f` ; \
               if test "x$bname" != xconfig.log ; then \
                  echo "" ; \
                  echo "-------- dump $f ----------------------------" ; \
                  cat $f ; \
               fi ; \
            done

        - name: make ptests
          run: |
            cd ${GITHUB_WORKSPACE}/build
            make -s LIBTOOLFLAGS=--silent V=1 ptests

        - name: make distcheck
          run: |
            cd ${GITHUB_WORKSPACE}/build
            make -j 8 distcheck DISTCHECK_CONFIGURE_FLAGS="--silent --with-mpi=${GITHUB_WORKSPACE}/MPI"

        - name: make install
          run: |
            set -x
            cd ${GITHUB_WORKSPACE}/build
            prefix_path=${GITHUB_WORKSPACE}/gio_install
            echo "---- test make install prefix=${prefix_path}"
            make -s LIBTOOLFLAGS=--silent V=1 install prefix=${prefix_path}
            prefix_path="/gio_install"
            destdir_path=${GITHUB_WORKSPACE}/inst
            echo "---- test make install prefix=${prefix_path} DESTDIR=${destdir_path}"
            make -s LIBTOOLFLAGS=--silent V=1 install prefix=${prefix_path} DESTDIR=${destdir_path}

        - name: Cleanup
          if: ${{ always() }}
          run: |
            cd ${GITHUB_WORKSPACE}/build
            make -s LIBTOOLFLAGS=--silent V=1 distclean

